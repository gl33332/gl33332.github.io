name: Hexo CI

on:
  pull_request:
    branches:
      - preview
      - master
  push:
    branches:
      - preview
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Hexo
        run: npx hexo generate
